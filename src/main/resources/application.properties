spring.application.name=Doc_storage_API

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=2GB

# File Storage
spring.file-datasource.jdbc-url=jdbc:postgresql://localhost:5433/${DB_NAME}
spring.file-datasource.username=${DB_USER}
spring.file-datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Users database
# Security DB (User Data / user_db_container)
spring.users-datasource.jdbc-url=jdbc:postgresql://localhost:5434/${USER_DB_NAME}
spring.users-datasource.username=${USER_DB_USER}
spring.users-datasource.password=${USER_DB_PASSWORD}
