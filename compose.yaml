services:
  postgres-db:
    image: "postgres:${POSTGRES_VERSION}"
    container_name: sentinel_db_container
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - ./postgres-data:/var/lib/postgresql